name: Stable Release

on:
    push:
        tags:
            - "v*"

jobs:
    build:
        runs-on: ${{ matrix.os }}
        permissions:
            contents: write

        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: macos-15
                      bundles: app,dmg
                      arch_suffix: aarch64
                    - os: macos-15-intel
                      bundles: app,dmg
                      arch_suffix: x64
                    - os: ubuntu-latest
                      bundles: appimage,deb
                      arch_suffix: amd64
                    - os: windows-latest
                      bundles: nsis
                      arch_suffix: x64

        steps:
            - name: Check out Git repository
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "pnpm"

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Install Linux system dependencies
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev \
                    libappindicator3-dev \
                    librsvg2-dev \
                    patchelf

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Verify stable updater configuration
              shell: bash
              env:
                  TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  STABLE_UPDATER_ENDPOINT: ${{ secrets.STABLE_UPDATER_ENDPOINT }}
              run: |
                  test -n "$TAURI_UPDATER_PUBKEY" || (echo "Missing TAURI_UPDATER_PUBKEY" && exit 1)
                  test -n "$TAURI_SIGNING_PRIVATE_KEY" || (echo "Missing TAURI_SIGNING_PRIVATE_KEY" && exit 1)
                  test -n "$STABLE_UPDATER_ENDPOINT" || (echo "Missing STABLE_UPDATER_ENDPOINT" && exit 1)

            - name: Cache Tauri Windows bundle tools
              if: matrix.os == 'windows-latest'
              uses: actions/cache@v4
              with:
                  path: ${{ env.LOCALAPPDATA }}\tauri
                  key: tauri-windows-tools-nsis-3.11

            - name: Build Tauri stable artifacts
              shell: bash
              env:
                  APP_RELEASE_CHANNEL: stable
                  TAURI_BUNDLES: ${{ matrix.bundles }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
                  TAURI_UPDATER_ENDPOINT: ${{ secrets.STABLE_UPDATER_ENDPOINT }}
              run: |
                  for attempt in 1 2 3; do
                    pnpm run tauri:build:release && break
                    [ $attempt -lt 3 ] && { echo "Attempt $attempt failed, retrying in 60s..."; sleep 60; } || exit 1
                  done

            - name: Collect macOS stable assets
              if: startsWith(matrix.os, 'macos-')
              run: |
                  mkdir -p release-assets/macos
                  for file in src-tauri/target/release/bundle/dmg/*.dmg; do
                    [ -e "$file" ] || continue
                    cp "$file" "release-assets/macos/Regex.Batch.Renamer_${GITHUB_REF_NAME#v}_${{ matrix.arch_suffix }}.dmg"
                  done
                  for file in src-tauri/target/release/bundle/macos/*.app.tar.gz; do
                    [ -e "$file" ] || continue
                    cp "$file" "release-assets/macos/Regex.Batch.Renamer_${{ matrix.arch_suffix }}.app.tar.gz"
                  done
                  for file in src-tauri/target/release/bundle/macos/*.app.tar.gz.sig; do
                    [ -e "$file" ] || continue
                    cp "$file" "release-assets/macos/Regex.Batch.Renamer_${{ matrix.arch_suffix }}.app.tar.gz.sig"
                  done
                  test -n "$(find release-assets/macos -type f -maxdepth 1 | head -n 1)"

            - name: Collect Linux stable assets
              if: matrix.os == 'ubuntu-latest'
              run: |
                  mkdir -p release-assets/linux
                  for file in src-tauri/target/release/bundle/appimage/*.AppImage; do
                    [ -e "$file" ] || continue
                    cp "$file" "release-assets/linux/Regex.Batch.Renamer_${GITHUB_REF_NAME#v}_${{ matrix.arch_suffix }}.AppImage"
                  done
                  for file in src-tauri/target/release/bundle/appimage/*.AppImage.sig; do
                    [ -e "$file" ] || continue
                    cp "$file" "release-assets/linux/Regex.Batch.Renamer_${GITHUB_REF_NAME#v}_${{ matrix.arch_suffix }}.AppImage.sig"
                  done
                  for file in src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz; do
                    [ -e "$file" ] || continue
                    cp "$file" "release-assets/linux/Regex.Batch.Renamer_${GITHUB_REF_NAME#v}_${{ matrix.arch_suffix }}.AppImage.tar.gz"
                  done
                  for file in src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig; do
                    [ -e "$file" ] || continue
                    cp "$file" "release-assets/linux/Regex.Batch.Renamer_${GITHUB_REF_NAME#v}_${{ matrix.arch_suffix }}.AppImage.tar.gz.sig"
                  done
                  for file in src-tauri/target/release/bundle/deb/*.deb; do
                    [ -e "$file" ] || continue
                    cp "$file" "release-assets/linux/Regex.Batch.Renamer_${GITHUB_REF_NAME#v}_${{ matrix.arch_suffix }}.deb"
                  done
                  test -n "$(find release-assets/linux -type f -maxdepth 1 | head -n 1)"

            - name: Collect Windows stable assets
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Force -Path release-assets/windows | Out-Null
                  Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -File -Filter "*.exe" | ForEach-Object {
                    Copy-Item $_.FullName -Destination "release-assets/windows/Regex.Batch.Renamer_$($env:GITHUB_REF_NAME.TrimStart('v'))_${{ matrix.arch_suffix }}-setup.exe"
                  }
                  Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -File -Filter "*.exe.sig" | ForEach-Object {
                    Copy-Item $_.FullName -Destination "release-assets/windows/Regex.Batch.Renamer_$($env:GITHUB_REF_NAME.TrimStart('v'))_${{ matrix.arch_suffix }}-setup.exe.sig"
                  }
                  Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -File -Filter "*.zip" | ForEach-Object {
                    Copy-Item $_.FullName -Destination "release-assets/windows/Regex.Batch.Renamer_$($env:GITHUB_REF_NAME.TrimStart('v'))_${{ matrix.arch_suffix }}.zip"
                  }
                  Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -File -Filter "*.zip.sig" | ForEach-Object {
                    Copy-Item $_.FullName -Destination "release-assets/windows/Regex.Batch.Renamer_$($env:GITHUB_REF_NAME.TrimStart('v'))_${{ matrix.arch_suffix }}.zip.sig"
                  }
                  if (-not (Get-ChildItem -Path "release-assets/windows" -File | Select-Object -First 1)) {
                    throw "No Windows release assets were collected."
                  }

            - name: Upload stable release assets
              uses: actions/upload-artifact@v4
              with:
                  name: stable-assets-${{ matrix.os }}
                  path: release-assets/**
                  if-no-files-found: error

    publish:
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Check out Git repository
              uses: actions/checkout@v4
              with:
                  ref: main
                  fetch-depth: 0
                  fetch-tags: true

            - name: Download collected stable assets
              uses: actions/download-artifact@v4
              with:
                  pattern: stable-assets-*
                  path: release-assets
                  merge-multiple: true

            - name: Generate stable updater metadata
              env:
                  REPO: ${{ github.repository }}
                  TAG_NAME: ${{ github.ref_name }}
              run: |
                  mkdir -p .tmp
                  node scripts/generate-updater-manifest.mjs \
                    --assets-dir release-assets \
                    --output .tmp/stable.json \
                    --repo "$REPO" \
                    --tag "$TAG_NAME" \
                    --version "${TAG_NAME#v}"

            - name: Prepare stable release notes
              env:
                  REPO: ${{ github.repository }}
                  TAG_NAME: ${{ github.ref_name }}
              run: |
                  node scripts/prepare-release-notes.mjs \
                    --tag "$TAG_NAME" \
                    --repo "$REPO" \
                    --output .tmp/release-notes.md

            - name: Publish stable release
              uses: softprops/action-gh-release@v2
              with:
                  prerelease: false
                  draft: false
                  body_path: .tmp/release-notes.md
                  files: |
                      release-assets/**/*

            - name: Publish stable updater manifest to main
              env:
                  TAG_NAME: ${{ github.ref_name }}
              run: |
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"
                  git fetch origin main
                  git checkout main
                  mkdir -p updater
                  cp .tmp/stable.json updater/stable.json
                  git add updater/stable.json
                  git commit -m "chore: update stable updater metadata for ${TAG_NAME}" || exit 0
                  git push origin main
